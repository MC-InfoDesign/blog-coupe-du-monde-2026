name: 🤖 Refresh quotidien CdM 2026

on:
  schedule:
    - cron: '0 7 * * *'   # Tous les jours à 9h Paris (7h UTC)
  workflow_dispatch:        # Bouton "Run workflow" manuel sur GitHub

permissions:
  contents: write           # Nécessaire pour pousser les articles mis à jour

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Installer les dépendances
        run: pip install requests groq anthropic python-dotenv

      - name: ⚽ Rafraîchir les articles (J-1)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python agent.py --refresh --count 12

      - name: 🗺️ Mettre à jour le sitemap
        run: python sitemap.py --base-url https://blog-coupe-du-monde-2026.vercel.app

      - name: 💾 Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles.json sitemap.xml
          git diff --staged --quiet && echo "Rien a committer" || git commit -m "🤖 Refresh du $(date +'%d/%m/%Y')"
          git push
